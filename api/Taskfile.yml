# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  start:
    cmds:
      - pwd
    preconditions:
      - sh: test -n "$VIRTUAL_ENV"
        msg: 'This must be run inside a virtual environment. Run `task venv:create` to create one.'

  venv:create:
    cmds:
      - uv venv

  pip:install:
    desc: Install pip
    cmds:
      - pip install --requirement requirements.txt

  pip:install:dev:
    desc: Install pip dev
    deps:
      - pip:install
    cmds:
      - pip install --requirement requirements-dev.txt

  pip:freeze:
    desc: Freeze pip
    prompt: Really frezze pip?
    cmds:
      - pip uninstall --requirement requirements.txt --requirement requirements-dev.txt --yes
      - pip install --requirement requirements.txt
      - pip freeze > requirements.txt

      - pip uninstall --requirement requirements.txt --requirement requirements-dev.txt --yes
      - pip install --requirement requirements-dev.txt
      - pip freeze > requirements-dev.txt

      - task pip:install:dev

  flake8:
    cmds:
      - flake8 {{.CLI_ARGS}}

  start:dev:
    cmds:
      - uv run fastapi dev src/api

  fixtures:load:
    prompt: Really reset data?
    cmds:
      - uv run python -m src.api.create-data

  lint:
    cmds:
      - isort src/
      - ruff check src/ --fix
      - ruff check src/
      - flake8 src/
