services:
  oidc-idp:
    profiles:
      - ${DOCKER_OIDC_DISABLE:-}
    # Let this container be accessible both internally and externally on the same domain.
    container_name: idp.${COMPOSE_DOMAIN}
    image: ghcr.io/geigerzaehler/oidc-provider-mock:latest
    # https://docs.docker.com/reference/compose-file/services/#command
    command:
      [
        "--port",
        "80",
        "--user-claims",
        '{"sub": "user", "email": "user@example.com", "roles": ["user"]}',
        "--user-claims",
        '{"sub": "overview-editor", "email": "overview-editor@example.com", "roles": ["overview-editor"]}',
        "--user-claims",
        '{"sub": "overview-viewer", "email": "overview-viewer@example.com", "roles": ["overview-viewer"]}',
        "--user-claims",
        '{"sub": "process-step-runner", "email": "process-step-runner@example.com", "roles": ["process-step-runner"]}',
        "--user-claims",
        '{"sub": "admin", "email": "admin@example.com", "roles": ["admin"]}',
      ]
    ports:
      - "80"
    networks:
      - app
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-idp.rule=Host(`idp.${COMPOSE_DOMAIN}`)"
