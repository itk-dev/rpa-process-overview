# https://taskfile.dev

version: '3'

vars:
  APP_PORT: 3000
  BASE_PATH: tidy_feedback
  WIDGET_URL: 'http://localhost:{{.APP_PORT}}/{{.BASE_PATH}}'

  # For some reason running tasks from this file from the parent Taskfile
  # (../Taskfile.yml) does not pick up the expected docker ompose project name.
  # Therefore we set it here.
  # WIDGETS_DOCKER_COMPOSE: 'docker compose --project-name rpa-process-overview-widgets'

tasks:
  build:
    desc: Build widget for production
    deps: [install]
    cmds:
      - rm -fr static/dist && mkdir -p static/dist
      - task: compose
        vars:
          TASK_ARGS: run --rm node npx standalone build --all --production

  build:dev:
    desc: Build widget for develoment
    deps: [install]
    cmds:
      - task: compose
        vars:
          TASK_ARGS: run --rm node npx standalone build --all

  dev:
    desc: 'Open widget dev site and start Vite dev server'
    deps: [install]
    cmds:
      # https://stackoverflow.com/a/73821896
      # - docker compose run --env ORIGIN=http://localhost:3000 --rm --publish '{{.APP_PORT}}:{{.APP_PORT}}' node npm run dev -- --port {{.APP_PORT}} --host
      - task: compose
        vars:
          TASK_ARGS: run --name tidy-feedback-widget --rm --publish '{{.APP_PORT}}:{{.APP_PORT}}' node npm run dev -- --port {{.APP_PORT}} --host

  open:
    desc: 'Open widget dev site'
    cmds:
      - open "{{.WIDGET_URL}}"

  install:
    cmds:
      - task: compose
        vars:
          TASK_ARGS: --profile '*' pull
      - task npm -- install
    internal: true

  npm:
    desc: 'Run npm command. Example: task {{.TASK}} -- install'
    cmds:
      - task: compose
        vars:
          TASK_ARGS: run --rm node npm

  coding-standards:apply:
    desc: 'Apply coding standards'
    cmds:
      - task: compose
        vars:
          TASK_ARGS: run --rm prettier . --write

  coding-standards:check:
    desc: 'Apply and check coding standards'
    cmds:
      - task: coding-standards:apply
      - task: compose
        vars:
          TASK_ARGS: run --rm prettier . --check

  compose:
    desc: Run docker compose
    cmds:
      # For some reason running tasks from this file from the parent Taskfile
      # (../Taskfile.yml) does not pick up the expected docker ompose project
      # name. Therefore we set it explicitly here.
      - 'docker compose --project-name rpa-process-overview-widgets {{.TASK_ARGS}} {{.CLI_ARGS}}'
    internal: true

  default:
    cmds:
      - task --list
    silent: true
